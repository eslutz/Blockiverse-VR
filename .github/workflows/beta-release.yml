name: Beta Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: beta-release-main
  cancel-in-progress: false

jobs:
  beta-build:
    name: Build beta APK
    uses: ./.github/workflows/release-channel-build.yml
    permissions:
      contents: read
    secrets:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    with:
      channel: beta
      base_version: "0.1.0"
      version_sequence: run${{ github.run_number }}.${{ github.run_attempt }}
      source_ref: ${{ github.sha }}
      build_mode: release
      require_main_ancestor: true
      validate_store_docs: false

  beta-upload:
    name: Upload beta to Meta
    needs: beta-build
    runs-on: ubuntu-latest
    environment: meta-beta
    permissions:
      actions: read
      contents: write
    outputs:
      meta_build_id: ${{ steps.upload.outputs.meta_build_id }}
    env:
      VERSION: ${{ needs.beta-build.outputs.version }}
      ARTIFACT_NAME: ${{ needs.beta-build.outputs.artifact_name }}
      APK_FILENAME: ${{ needs.beta-build.outputs.apk_filename }}
      RELEASE_NOTES_FILENAME: ${{ needs.beta-build.outputs.release_notes_filename }}
      SOURCE_SHA: ${{ needs.beta-build.outputs.source_sha }}
    steps:
      - name: Check out trusted workflow helpers
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download beta build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: .ci-artifacts/beta

      - name: Install Meta platform utility
        env:
          OVR_PLATFORM_UTIL_LINUX_URL: ${{ secrets.OVR_PLATFORM_UTIL_LINUX_URL || vars.OVR_PLATFORM_UTIL_LINUX_URL }}
          OVR_PLATFORM_UTIL_LINUX_SHA256: ${{ secrets.OVR_PLATFORM_UTIL_LINUX_SHA256 || vars.OVR_PLATFORM_UTIL_LINUX_SHA256 }}
        run: scripts/ci/install-ovr-platform-util.sh --output "$RUNNER_TEMP/ovr-platform-util"

      - name: Upload beta build to Meta
        id: upload
        env:
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_AGE_GROUP: ${{ secrets.META_AGE_GROUP || vars.META_AGE_GROUP || 'MIXED_AGES' }}
        run: |
          scripts/ci/meta-upload-quest-build.sh \
            --channel beta \
            --apk ".ci-artifacts/beta/${APK_FILENAME}" \
            --notes-file ".ci-artifacts/beta/${RELEASE_NOTES_FILENAME}" \
            --output ".ci-artifacts/beta/meta-upload-output.txt" \
            --summary ".ci-artifacts/beta/meta-upload-summary.json" \
            --version "$VERSION" \
            --source-sha "$SOURCE_SHA"

          meta_build_id="$(
            sed -nE 's/.*"meta_build_id":"([^"]+)".*/\1/p' .ci-artifacts/beta/meta-upload-summary.json | head -n 1
          )"
          test -n "$meta_build_id"
          echo "meta_build_id=$meta_build_id" >> "$GITHUB_OUTPUT"

      - name: Create GitHub beta prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$VERSION" .ci-artifacts/beta/* \
            --target "$SOURCE_SHA" \
            --title "Blockiverse VR ${VERSION}" \
            --notes-file ".ci-artifacts/beta/${RELEASE_NOTES_FILENAME}" \
            --prerelease \
            --latest=false
