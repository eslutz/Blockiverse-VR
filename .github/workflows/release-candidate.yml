name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      beta_version:
        description: Beta GitHub release tag to promote, for example v0.1.0-beta.run42.1
        required: false
        type: string
      meta_build_id:
        description: Meta Beta build ID to promote when beta_version is not available
        required: false
        type: string
      base_version:
        description: SemVer base version without a leading v, used only when beta_version is omitted
        required: true
        type: string
        default: "0.1.0"
      candidate:
        description: Candidate number, for example 1 creates v0.1.0-rc.1
        required: true
        type: string
        default: "1"
      promote_to_rc:
        description: Promote the selected Beta build to the Meta rc channel
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ inputs.beta_version || inputs.base_version }}-${{ inputs.candidate }}
  cancel-in-progress: false

jobs:
  release-candidate:
    name: Promote beta to release candidate
    if: ${{ inputs.promote_to_rc }}
    runs-on: ubuntu-latest
    environment: meta-rc
    permissions:
      contents: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      meta_build_id: ${{ steps.resolve.outputs.meta_build_id }}
    steps:
      - name: Check out trusted workflow helpers
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Validate store submission documents
        run: scripts/store/validate-store-submission-docs.sh

      - name: Resolve Beta build
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          BETA_VERSION: ${{ inputs.beta_version }}
          META_BUILD_ID_INPUT: ${{ inputs.meta_build_id }}
          BASE_VERSION_INPUT: ${{ inputs.base_version }}
          CANDIDATE: ${{ inputs.candidate }}
        run: |
          mkdir -p .ci-source .ci-artifacts/rc

          if [ -z "$BETA_VERSION" ] && [ -z "$META_BUILD_ID_INPUT" ]; then
            echo "Provide beta_version or meta_build_id." >&2
            exit 64
          fi

          base_version="$BASE_VERSION_INPUT"
          meta_build_id="$META_BUILD_ID_INPUT"
          source_sha=""

          if [ -n "$BETA_VERSION" ]; then
            gh release download "$BETA_VERSION" \
              --pattern meta-upload-summary.json \
              --dir .ci-source \
              --clobber

            if [ -z "$meta_build_id" ]; then
              meta_build_id="$(
                sed -nE 's/.*"meta_build_id":"([^"]+)".*/\1/p' .ci-source/meta-upload-summary.json | head -n 1
              )"
            fi

            source_sha="$(
              sed -nE 's/.*"source_sha":"([^"]+)".*/\1/p' .ci-source/meta-upload-summary.json | head -n 1
            )"

            beta_base="${BETA_VERSION#v}"
            base_version="${beta_base%%-*}"

            gh release download "$BETA_VERSION" \
              --dir .ci-artifacts/rc \
              --clobber
          else
            git fetch origin main --depth=1
            source_sha="$(git rev-parse origin/main)"
          fi

          if [ -z "$source_sha" ]; then
            source_sha="$(gh release view "$BETA_VERSION" --json targetCommitish --jq '.targetCommitish')"
          fi

          if [ -z "$meta_build_id" ]; then
            echo "Could not resolve a Meta build ID." >&2
            exit 65
          fi

          rc_version="$(scripts/ci/release-version.sh rc "$base_version" "$CANDIDATE")"

          {
            echo "# Blockiverse VR ${rc_version}"
            echo
            echo "- Channel: rc"
            echo "- Source Meta channel: beta"
            echo "- Meta build ID: ${meta_build_id}"
            if [ -n "$BETA_VERSION" ]; then
              echo "- Promoted from GitHub release: ${BETA_VERSION}"
            fi
            echo "- Source commit: ${source_sha}"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "This release candidate promotes an existing Meta Beta build to RC without rebuilding the APK."
          } > .ci-artifacts/rc/release-notes.md

          echo "version=$rc_version" >> "$GITHUB_OUTPUT"
          echo "meta_build_id=$meta_build_id" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

      - name: Install Meta platform utility
        env:
          OVR_PLATFORM_UTIL_LINUX_URL: ${{ secrets.OVR_PLATFORM_UTIL_LINUX_URL || vars.OVR_PLATFORM_UTIL_LINUX_URL }}
          OVR_PLATFORM_UTIL_LINUX_SHA256: ${{ secrets.OVR_PLATFORM_UTIL_LINUX_SHA256 || vars.OVR_PLATFORM_UTIL_LINUX_SHA256 }}
        run: scripts/ci/install-ovr-platform-util.sh --output "$RUNNER_TEMP/ovr-platform-util"

      - name: Promote Beta build to Meta RC
        env:
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_AGE_GROUP: ${{ secrets.META_AGE_GROUP || vars.META_AGE_GROUP || 'MIXED_AGES' }}
          META_BUILD_ID: ${{ steps.resolve.outputs.meta_build_id }}
          VERSION: ${{ steps.resolve.outputs.version }}
          SOURCE_SHA: ${{ steps.resolve.outputs.source_sha }}
        run: |
          scripts/ci/meta-promote-release-channel.sh \
            --source-channel beta \
            --destination-channel rc \
            --build-id "$META_BUILD_ID" \
            --output ".ci-artifacts/rc/meta-upload-output.txt" \
            --summary ".ci-artifacts/rc/meta-upload-summary.json" \
            --version "$VERSION" \
            --source-sha "$SOURCE_SHA"

      - name: Create GitHub RC prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.resolve.outputs.version }}
          SOURCE_SHA: ${{ steps.resolve.outputs.source_sha }}
        run: |
          gh release create "$VERSION" .ci-artifacts/rc/* \
            --target "$SOURCE_SHA" \
            --title "Blockiverse VR ${VERSION}" \
            --notes-file .ci-artifacts/rc/release-notes.md \
            --prerelease \
            --latest=false

  release-candidate-toggle:
    name: Await manual RC promotion toggle
    if: ${{ !inputs.promote_to_rc }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Explain skipped release
        run: echo "Set promote_to_rc to true to promote a Beta build to RC."
