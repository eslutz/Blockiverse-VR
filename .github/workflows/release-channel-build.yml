name: Release Channel Build

on:
  workflow_call:
    inputs:
      channel:
        description: "Build channel: alpha or beta"
        required: true
        type: string
      base_version:
        description: SemVer base version without a leading v
        required: true
        type: string
      version_sequence:
        description: SemVer pre-release sequence
        required: true
        type: string
      source_ref:
        description: Commit, branch, or tag to build
        required: true
        type: string
      build_mode:
        description: "Android build mode: development or release"
        required: true
        type: string
      require_main_ancestor:
        description: Require the selected commit to be reachable from origin/main
        required: true
        type: boolean
      validate_store_docs:
        description: Run store submission document validation
        required: true
        type: boolean
    outputs:
      version:
        description: GitHub release version tag
        value: ${{ jobs.build.outputs.version }}
      artifact_name:
        description: Uploaded artifact bundle name
        value: ${{ jobs.build.outputs.artifact_name }}
      apk_filename:
        description: APK file name inside the artifact bundle
        value: ${{ jobs.build.outputs.apk_filename }}
      release_notes_filename:
        description: Release notes file name inside the artifact bundle
        value: ${{ jobs.build.outputs.release_notes_filename }}
      source_sha:
        description: Source commit SHA built by the workflow
        value: ${{ jobs.build.outputs.source_sha }}
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.channel }} APK
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.3.16f1-android-3.2.2
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
      apk_filename: ${{ steps.version.outputs.apk_filename }}
      release_notes_filename: ${{ steps.version.outputs.release_notes_filename }}
      source_sha: ${{ steps.version.outputs.source_sha }}
    env:
      UNITY_EDITOR: /opt/unity/Editor/Unity
    steps:
      - name: Check out source ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Compute release version
        id: version
        env:
          CHANNEL: ${{ inputs.channel }}
          BASE_VERSION: ${{ inputs.base_version }}
          VERSION_SEQUENCE: ${{ inputs.version_sequence }}
        run: |
          case "$CHANNEL" in
            alpha|beta) ;;
            *)
              echo "Only alpha and beta create new uploaded builds. Got: $CHANNEL" >&2
              exit 64
              ;;
          esac

          version="$(scripts/ci/release-version.sh "$CHANNEL" "$BASE_VERSION" "$VERSION_SEQUENCE")"
          version_name="${version#v}"
          version_code="$(( $(date -u +%s) - 1577836800 ))"
          source_sha="$(git rev-parse HEAD)"
          artifact_name="blockiverse-${CHANNEL}-${version}"
          apk_filename="BlockiverseVR-${version}-${CHANNEL}.apk"
          release_notes_filename="release-notes.md"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "apk_filename=$apk_filename" >> "$GITHUB_OUTPUT"
          echo "release_notes_filename=$release_notes_filename" >> "$GITHUB_OUTPUT"

      - name: Validate build inputs
        env:
          BUILD_MODE: ${{ inputs.build_mode }}
        run: |
          case "$BUILD_MODE" in
            development|release) ;;
            *)
              echo "Unsupported build mode: $BUILD_MODE" >&2
              exit 64
              ;;
          esac

      - name: Verify selected ref is on main
        if: ${{ inputs.require_main_ancestor }}
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor HEAD origin/main

      - name: Check repository safety
        run: scripts/ci/forbidden-files.sh

      - name: Validate store submission documents
        if: ${{ inputs.validate_store_docs }}
        run: scripts/store/validate-store-submission-docs.sh

      - name: Validate signing secrets
        if: ${{ inputs.build_mode == 'release' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Prepare build directories
        env:
          CHANNEL: ${{ inputs.channel }}
        run: mkdir -p ".ci-artifacts/${CHANNEL}" .ci-secrets

      - name: Decode Android signing keystore
        if: ${{ inputs.build_mode == 'release' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > .ci-secrets/blockiverse-release.keystore

      - name: Build Android APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/.ci-secrets/blockiverse-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          BUILD_MODE: ${{ inputs.build_mode }}
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ steps.version.outputs.version }}
          APK_FILENAME: ${{ steps.version.outputs.apk_filename }}
          UNITY_ANDROID_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          UNITY_ANDROID_VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          output_path=".ci-artifacts/${CHANNEL}/${APK_FILENAME}"
          if [ "$BUILD_MODE" = "release" ]; then
            scripts/unity/build-release-apk.sh "$output_path"
          else
            scripts/unity/build-development-apk.sh "$output_path"
          fi

      - name: Generate checksums and release notes
        env:
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          BUILD_MODE: ${{ inputs.build_mode }}
          SOURCE_SHA: ${{ steps.version.outputs.source_sha }}
        run: |
          artifact_dir=".ci-artifacts/${CHANNEL}"
          cd "$artifact_dir"
          sha256sum *.apk > checksums.txt
          {
            echo "# Blockiverse VR ${VERSION}"
            echo
            echo "- Channel: ${CHANNEL}"
            echo "- Build mode: ${BUILD_MODE}"
            echo "- Android versionName: ${VERSION_NAME}"
            echo "- Android versionCode: ${VERSION_CODE}"
            echo "- Source commit: ${SOURCE_SHA}"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "Version convention: production uses vX.Y.Z; release candidates use vX.Y.Z-rc.N; beta uses vX.Y.Z-beta.runN.ATTEMPT; alpha uses vX.Y.Z-alpha.prN.RUN.ATTEMPT."
            echo
            echo "See CHANGELOG.md for the current release notes source."
          } > release-notes.md

      - name: Attach validation artifacts when present
        env:
          CHANNEL: ${{ inputs.channel }}
        run: |
          artifact_dir=".ci-artifacts/${CHANNEL}"
          if [ -d TestResults/Unity ]; then
            tar -czf "${artifact_dir}/test-results.tar.gz" TestResults/Unity
          fi
          if [ -d docs/testing/performance ]; then
            tar -czf "${artifact_dir}/performance-docs.tar.gz" docs/testing/performance
          fi

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: .ci-artifacts/${{ inputs.channel }}/
          if-no-files-found: error
