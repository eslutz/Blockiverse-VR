name: Alpha Release

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: alpha-release-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  alpha-build:
    name: Build alpha APK
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    uses: ./.github/workflows/release-channel-build.yml
    permissions:
      contents: read
    with:
      channel: alpha
      base_version: "0.1.0"
      version_sequence: pr${{ github.event.pull_request.number }}.${{ github.run_number }}.${{ github.run_attempt }}
      source_ref: ${{ github.event.pull_request.head.sha }}
      build_mode: development
      require_main_ancestor: false
      validate_store_docs: false

  alpha-upload:
    name: Upload alpha to Meta
    needs: alpha-build
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    environment: meta-alpha
    permissions:
      actions: read
      contents: write
    outputs:
      meta_build_id: ${{ steps.upload.outputs.meta_build_id }}
    env:
      VERSION: ${{ needs.alpha-build.outputs.version }}
      ARTIFACT_NAME: ${{ needs.alpha-build.outputs.artifact_name }}
      APK_FILENAME: ${{ needs.alpha-build.outputs.apk_filename }}
      RELEASE_NOTES_FILENAME: ${{ needs.alpha-build.outputs.release_notes_filename }}
      SOURCE_SHA: ${{ needs.alpha-build.outputs.source_sha }}
    steps:
      - name: Check out trusted workflow helpers
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Download alpha build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: .ci-artifacts/alpha

      - name: Install Meta platform utility
        env:
          OVR_PLATFORM_UTIL_LINUX_URL: ${{ secrets.OVR_PLATFORM_UTIL_LINUX_URL || vars.OVR_PLATFORM_UTIL_LINUX_URL }}
          OVR_PLATFORM_UTIL_LINUX_SHA256: ${{ secrets.OVR_PLATFORM_UTIL_LINUX_SHA256 || vars.OVR_PLATFORM_UTIL_LINUX_SHA256 }}
        run: scripts/ci/install-ovr-platform-util.sh --output "$RUNNER_TEMP/ovr-platform-util"

      - name: Upload alpha build to Meta
        id: upload
        env:
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_AGE_GROUP: ${{ secrets.META_AGE_GROUP || vars.META_AGE_GROUP || 'MIXED_AGES' }}
        run: |
          scripts/ci/meta-upload-quest-build.sh \
            --channel alpha \
            --apk ".ci-artifacts/alpha/${APK_FILENAME}" \
            --notes-file ".ci-artifacts/alpha/${RELEASE_NOTES_FILENAME}" \
            --output ".ci-artifacts/alpha/meta-upload-output.txt" \
            --summary ".ci-artifacts/alpha/meta-upload-summary.json" \
            --version "$VERSION" \
            --source-sha "$SOURCE_SHA"

          meta_build_id="$(
            sed -nE 's/.*"meta_build_id":"([^"]+)".*/\1/p' .ci-artifacts/alpha/meta-upload-summary.json | head -n 1
          )"
          test -n "$meta_build_id"
          echo "meta_build_id=$meta_build_id" >> "$GITHUB_OUTPUT"

      - name: Create GitHub alpha prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$VERSION" .ci-artifacts/alpha/* \
            --target "$SOURCE_SHA" \
            --title "Blockiverse VR ${VERSION}" \
            --notes-file ".ci-artifacts/alpha/${RELEASE_NOTES_FILENAME}" \
            --prerelease \
            --latest=false

  alpha-release-skipped:
    name: Skip fork alpha release
    if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Explain skipped release
        run: echo "Alpha release publication is skipped for fork pull requests."
