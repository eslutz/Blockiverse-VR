name: PR CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check shell script syntax
        run: bash -n scripts/store/*.sh scripts/unity/*.sh
      - name: Check release version conventions
        run: |
          grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' VERSION
          grep -q 'vMAJOR.MINOR.PATCH-alpha.prPR.RUN.ATTEMPT' docs/adr/0005-release-versioning.md
          grep -q 'vMAJOR.MINOR.PATCH-beta.runRUN.ATTEMPT' docs/adr/0005-release-versioning.md
          grep -q 'vMAJOR.MINOR.PATCH-rc.CANDIDATE' docs/adr/0005-release-versioning.md
