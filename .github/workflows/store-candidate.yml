name: Store Candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Main commit or tag to validate
        required: true
        type: string

jobs:
  store-candidate:
    name: Store candidate checklist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Verify selected ref is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor HEAD origin/main
      - name: Check repository safety
        run: scripts/ci/forbidden-files.sh
      - name: Validate store submission docs
        run: scripts/store/validate-store-submission-docs.sh
      - name: External submission steps intentionally excluded
        run: |
          echo "In-repo store metadata validation only."
          echo "No build upload, release channel, tester invite, signing secret, or dashboard submission is performed by this workflow."
