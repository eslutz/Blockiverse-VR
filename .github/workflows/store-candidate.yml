name: Store Candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Main commit or tag to validate
        required: true
        type: string

jobs:
  store-candidate:
    name: Store candidate checklist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Verify selected ref is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor HEAD origin/main
      - name: Check repository safety
        run: scripts/ci/forbidden-files.sh
      - name: Validate store submission documents
        run: scripts/store/validate-store-submission-docs.sh
      - name: Check release workflow contract
        run: |
          test -f VERSION
          test -f docs/adr/0005-release-versioning.md
          test -f .github/workflows/meta-release.yml
          test -x scripts/unity/build-release-apk.sh
          grep -q "BuildReleaseAndroid" Assets/Blockiverse/Scripts/Editor/BlockiverseBuildSmoke.cs
          grep -q "BuildDevelopmentAndroid" Assets/Blockiverse/Scripts/Editor/BlockiverseBuildSmoke.cs
          grep -q "ANDROID_KEYSTORE_BASE64" .github/workflows/meta-release.yml
          grep -q "unityci/editor:ubuntu-6000.3.16f1-android-3" .github/workflows/meta-release.yml
          grep -q "upload-quest-build" .github/workflows/meta-release.yml
          grep -q "set-release-channel-build" .github/workflows/meta-release.yml
          grep -q "META_AGE_GROUP" .github/workflows/meta-release.yml
          grep -q "meta-alpha" .github/workflows/meta-release.yml
          grep -q "meta-beta" .github/workflows/meta-release.yml
          grep -q "meta-rc" .github/workflows/meta-release.yml
          grep -q "meta-production" .github/workflows/meta-release.yml
          grep -q "channel=\"alpha\"" .github/workflows/meta-release.yml
          grep -q "channel=\"beta\"" .github/workflows/meta-release.yml
          grep -q "source_channel=\"beta\"" .github/workflows/meta-release.yml
          grep -q "destination_channel=\"rc\"" .github/workflows/meta-release.yml
          grep -q "source_channel=\"rc\"" .github/workflows/meta-release.yml
          grep -q "destination_channel=\"store\"" .github/workflows/meta-release.yml
          ! grep -q "store_review_approved" .github/workflows/meta-release.yml
          test ! -f .github/workflows/alpha-release.yml
          test ! -f .github/workflows/beta-release.yml
          test ! -f .github/workflows/release-candidate.yml
          test ! -f .github/workflows/production-release.yml
          test ! -f .github/workflows/release-channel-build.yml
